# =============================================================================
# jdoo - Nginx Reverse Proxy for Odoo
# =============================================================================
# Routes /websocket/ to gevent worker, everything else to HTTP workers.
# Required when Odoo runs with workers > 0 (multi-processing mode).
#
# Uses envsubst variables: $ODOO_PORT, $ODOO_INTERNAL_PORT, $GEVENT_INTERNAL_PORT
# =============================================================================

upstream odoo_http {
    server odoo:8069;
}

upstream odoo_gevent {
    server odoo:8072;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen ${ODOO_PORT} default_server;
    server_name _;

    # Increase proxy buffer sizes for Odoo
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;

    # Common proxy headers
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;

    # Timeouts
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    proxy_read_timeout 720s;

    # Max upload size (Odoo attachments, imports)
    client_max_body_size 200m;

    # Gzip compression
    gzip on;
    gzip_types text/css text/plain text/xml application/xml application/json
               application/javascript text/javascript image/svg+xml;

    # -------------------------------------------------------------------------
    # WebSocket / LiveChat / Discuss → gevent worker
    # Matches: /websocket, /websocket/, /websocket?version=...
    # -------------------------------------------------------------------------
    location /websocket {
        proxy_pass http://odoo_gevent;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # WebSocket keepalive (24 hours)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -------------------------------------------------------------------------
    # Long-polling fallback (older Odoo versions < 16)
    # -------------------------------------------------------------------------
    location /longpolling {
        proxy_pass http://odoo_gevent;
    }

    # -------------------------------------------------------------------------
    # Everything else → HTTP workers
    # -------------------------------------------------------------------------
    location / {
        proxy_pass http://odoo_http;
        proxy_redirect off;
    }
}
